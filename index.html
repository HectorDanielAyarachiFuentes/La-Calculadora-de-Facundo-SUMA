<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Calculadora de Facundo+</title>

    
    <!-- Descripción general para motores de búsqueda (SEO) -->
    <meta name="description" content="Una herramienta educativa para aprender a sumar de forma visual. Ideal para niños y para quienes enseñan. ¡Descubre el procedimiento paso a paso y disfruta de las animaciones interactivas!">
    <meta name="author" content="HectorDanielAyarachiFuentes">

    <!-- Metaetiquetas de Open Graph (para Facebook, LinkedIn, etc.) -->
    <meta property="og:title" content="Calculadora Facundo+ | Suma Visual e Interactiva">
    <meta property="og:description" content="Una herramienta educativa para aprender a sumar de forma visual, ideal para niños y para quienes enseñan.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hectordanielayarachifuentes.github.io/La-Calculadora-de-Facundo-SUMA/">
    <meta property="og:image" content="https://raw.githubusercontent.com/HectorDanielAyarachiFuentes/La-Calculadora-de-Facundo-SUMA/main/img/image.jpg">
    <meta property="og:image:alt" content="Vista previa de la Calculadora de Facundo+ mostrando una suma animada.">
    <meta property="fb:app_id" content="750701624513110" />

    <!-- Metaetiquetas para Tarjetas de X (antes Twitter) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Calculadora Facundo+ | Suma Visual e Interactiva">
    <meta name="twitter:description" content="Una herramienta educativa para aprender a sumar de forma visual, ideal para niños y para quienes enseñan.">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/HectorDanielAyarachiFuentes/La-Calculadora-de-Facundo-SUMA/main/img/image.jpg">
    
    <link rel="stylesheet" href="scss/main.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- ✅ CORRECCIÓN 1: Color del favicon arreglado -->
  <link rel="icon" href="calculadorafavicon.svg" type="image/svg+xml" sizes="any">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <!-- El SDK de Facebook se mantiene aquí -->
    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/es_LA/sdk.js#xfbml=1&version=v18.0&appId=750701624513110&autoLogAppEvents=1" nonce="aBcDeF12"></script>

    <main class="container">
        <!-- ... todo el contenido de tu calculadora ... -->
        <header>
            <div class="header-top">
                 <h1>🧮 La Calculadora de Facundo +</h1>
                 <div class="header-controls">
                     <button id="theme-toggle-btn" class="theme-btn" aria-label="Cambiar tema">🌙</button>
                 </div>
            </div>
            <p class="subtitle">Una experiencia de suma visual e interactiva.</p>
        </header>

        <div class="calculator-layout-wrapper">
            <aside id="procedure-section" class="hidden">
                <h2>Procedimiento</h2>
                <ol id="procedure-list"></ol>
            </aside>
            <div class="main-content">
                <div id="whiteboard">
                    <div id="operands-container" role="region" aria-label="Operandos de la suma" aria-live="polite"></div>
                    <svg id="calculation-svg" class="hidden"></svg>
                </div>
                
                <div class="playback-options">
                    <span class="playback-label">Velocidad:</span>
                    <div class="speed-control" aria-label="Velocidad de Animación">
                        <button class="speed-btn" data-speed="2.0" aria-label="Lento">
                            <span class="speed-emoji">🐢</span>
                            <span class="speed-text">Lento</span>
                        </button>
                        <button class="speed-btn active" data-speed="1.0" aria-label="Normal">
                            <span class="speed-emoji">🙍</span>
                            <span class="speed-text">Normal</span>
                        </button>
                        <button class="speed-btn" data-speed="0.25" aria-label="Rápido">
                            <span class="speed-emoji">⚡</span>
                            <span class="speed-text">Rápido</span>
                        </button>
                    </div>
                </div>
                <div id="input-container">
                    <div class="input-section">
                        <input type="text" id="numberInput" placeholder="Ingresa un número..." aria-label="Número para sumar">
                        <button id="addBtn" class="btn-add">
                            <!-- Plus in circle -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.49 2 2 6.49 2 12s4.49 10 10 10 10-4.49 10-10S17.51 2 12 2zm4 11h-3v3c0 .55-.45 1-1 1s-1-.45-1-1v-3H8c-.55 0-1-.45-1-1s.45-1 1-1h3V8c0-.55.45-1 1-1s1 .45 1 1v3h3c.55 0 1 .45 1 1s-.45 1-1 1z"/></svg>
                            <span>Añadir</span>
                        </button>
                    </div>
                </div>
                <div class="controls">
                    <button id="calculateBtn" class="btn-calculate" disabled>
                        <!-- Calculator icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zM8 17H6v-2h2v2zm0-4H6v-2h2v2zm4 4h-2v-2h2v2zm0-4h-2v-2h2v2zm2-5H6V6h8v2zm4 9h-2v-6h2v6zm0-8h-2V8h2v2z"/></svg>
                        <span>¡A Sumar!</span>
                    </button>
                    <button id="replayBtn" class="btn-replay hidden">
                        <!-- Replay icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                        <span>Repetir Animación</span>
                    </button>
                    <button id="downloadBtn" class="btn-download hidden">
                        <!-- Download icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18 15v3H6v-3H4v3c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-3h-2zm-1-4-1.41-1.41L13 12.17V4h-2v8.17L8.41 9.59 7 11l5 5 5-5z"/></svg>
                        <span>Descargar Suma</span>
                    </button>
                    <button id="resetBtn" class="btn-reset">
                        <!-- New page icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M14.59 2.59 19.42 7.4A2 2 0 0 1 20 8.83V20a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h7.17a2 2 0 0 1 1.42.59zM14 9h4.5L14 4.5V9zm-2 6h-2v-2h2zm0-4h-2V9h2z"/></svg>
                        <span>Nueva Suma</span>
                    </button>
                </div>
                <!-- Toggle Modo Práctica -->
                <div class="practice-mode-control" style="text-align: center; margin-bottom: 2rem; margin-top: 1rem;">
                    <input type="checkbox" id="practiceModeToggle" class="hidden-checkbox">
                    <label class="btn-practice-mode" for="practiceModeToggle">
                        <svg class="practice-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 14L21 9L12 4L3 9L12 14Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M3 14V19C3 19 8 22 12 22C16 22 21 19 21 19V14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 14V18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>Modo Práctica Interactivo</span>
                    </label>
                </div>
                <div id="explanation-box" role="status" aria-live="polite">
                    <p id="explanation-text">Añade al menos dos números para empezar.</p>
                </div>
            </div>
            <aside id="history-section" class="hidden">
                <h2>Historial de Sumas</h2>
                <ul id="history-list"></ul>
            </aside>
        </div>

        <footer class="motivational-footer">
            <div class="footer-logo">
                 <svg class="logo-svg" xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='#6e48aa'/><circle cx='8' cy='10' r='2.5' fill='#fd7e14'/><circle cx='14' cy='10' r='2.5' fill='#fd7e14'/><circle cx='20' cy='10' r='2.5' fill='#fd7e14'/><circle cx='26' cy='10' r='2.5' fill='#fd7e14'/><circle cx='8' cy='22' r='2.5' fill='#28a745'/><circle cx='14' cy='22' r='2.5' fill='#28a745'/><circle cx='20' cy='22' r='2.5' fill='#28a745'/><circle cx='26' cy='22' r='2.5' fill='#28a745'/></svg>
                 <span>La Calculadora de Facundo</span>
            </div>
            <div class="footer-buttons">
                <button id="motivationForKid" class="footer-btn">✨ Para el niño</button>
                <button id="motivationForAdult" class="footer-btn">❤️ Para quien enseña</button>
                <a href="https://github.com/HectorDanielAyarachiFuentes" target="_blank" rel="noopener noreferrer" class="footer-btn github-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true" class="github-icon"><path d="M8 0C3.58 0 0 3.58 0 8a8.01 8.01 0 005.47 7.59c.4.08.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.28.82 2.15 0 3.06-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21-.15.46-.55.38A8.01 8.01 0 008 0z"/></svg>
                    <span>Mi GitHub</span>
                </a>
                
                <!-- ✅ CORRECCIÓN 2: Reemplazamos el botón de FB por uno personalizado -->
                <button id="custom-fb-share-btn" class="footer-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="margin-right: 8px;" aria-hidden="true">
                        <path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951z"/>
                    </svg>
                    <span>Compartir</span>
                </button>
            </div>
        </footer>
    </main>
    
    <script type="module" src="js/main.js"></script> 
</body>
</html>
